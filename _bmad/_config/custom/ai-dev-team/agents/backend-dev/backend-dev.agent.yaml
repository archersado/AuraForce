      exec: '{project-root}/src/modules/ai-dev-team/workflows/task-breakdown/workflow.md'
      description: '[BA] Backend architecture design'
    - trigger: AD or fuzzy match on api-design
      exec: '{project-root}/src/modules/ai-dev-team/workflows/task-breakdown/workflow.md'
      description: '[AD] API design'
    - trigger: BC or fuzzy match on backend-code
