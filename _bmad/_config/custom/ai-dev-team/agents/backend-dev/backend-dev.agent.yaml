      description: '[BC] Backend code implementation'
    - trigger: BD or fuzzy match on backend-dev
      exec: '{project-root}/src/modules/ai-dev-team/workflows/dev-delivery/workflow.md'
      description: '[BD] Backend Dev (architecture + code)'
    - trigger: BB or fuzzy match on bug-fix-backend
